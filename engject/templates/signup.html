<!DOCTYPE html>
<html>
<head>

<title>EngJect Signup</title>

<style>

body{
background:#0f172a;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:40px;
border-radius:10px;
width:350px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
}

button{
width:100%;
padding:10px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
}

a{
text-decoration:none;
font-size:14px;
}

</style>

</head>

<body>

<div class="box">

<h2>Create EngJect Account</h2>

{% if error %}
<p style="color:red">{{error}}</p>
{% endif %}

<form method="POST">

{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Signup</button>

</form>

<br>

<a href="/">Already have account? Login</a>

</div>

</body>
</html>
