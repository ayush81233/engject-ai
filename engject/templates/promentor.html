{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PromMentor AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f1115;
            --bg-card: #1c1f26;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --glass-bg: rgba(28, 31, 38, 0.7);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: 
                linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 20%, rgba(255,165,0,0.15), transparent 40%),
                        radial-gradient(circle at 80% 30%, rgba(0,255,255,0.1), transparent 40%);
            z-index: -1;
        }

        /* SIDEBAR (Match Dashboard) */
        .side-menu {
            height: 100vh;
            width: 250px;
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
            box-sizing: border-box;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .side-header {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 30px;
            padding: 0 20px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .side-menu a {
            text-decoration: none;
            color: var(--text-muted);
            padding: 15px 20px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            position: relative;
        }

        .side-menu a:hover {
            background: rgba(59, 130, 246, 0.1);
            color: var(--text-main);
        }

        .side-menu a.active {
            background: rgba(59, 130, 246, 0.2);
            color: var(--accent);
            border-right: 4px solid var(--accent);
            font-weight: 600;
        }

        /* MAIN CHAT AREA */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') center/cover no-repeat;
            position: relative;
        }

        .chat-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 17, 21, 0.85); /* Dark overlay */
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        .chat-wrapper {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        /* CHAT HEADER */
        .chat-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }

        .chat-header h1 {
            margin: 0;
            font-size: 24px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .chat-header .status {
            font-size: 14px;
            color: #10b981;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 8px #10b981;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* CHAT MESSAGES */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            background: var(--glass-bg);
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }

        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: var(--border);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideIn 0.3s ease-out;
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* AI Message */
        .message.ai {
            align-self: flex-start;
            background: rgba(31, 41, 55, 0.8);
            color: var(--text-main);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
        }

        /* User Message */
        .message.user {
            align-self: flex-end;
            background: var(--accent);
            color: #fff;
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        .typing-indicator {
            display: none;
            align-self: flex-start;
            background: rgba(31, 41, 55, 0.8);
            padding: 16px;
            border-radius: 16px;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border);
            column-gap: 6px;
            align-items: center;
        }

        .typing-indicator.active {
            display: flex;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background-color: var(--text-muted);
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }


        /* INPUT AREA */
        .chat-input-area {
            display: flex;
            gap: 12px;
            background: var(--glass-bg);
            padding: 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            backdrop-filter: blur(8px);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            font-family: inherit;
            resize: none;
            height: 24px;
            max-height: 120px;
            outline: none;
        }

        .chat-input::placeholder {
            color: var(--text-muted);
        }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }

        .send-btn:hover {
            background: var(--accent-hover);
            transform: scale(1.05);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .side-menu { display: none; }
            .chat-wrapper { padding: 10px; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <div class="side-menu">
        <div class="side-header">
            ⚙ EngJect
        </div>
        <a href="/dashboard/">🏠 Home</a>
        <a href="/trends/">📈 Trends</a>
        <a href="/project-news/">📰 Project News</a>
        <a href="/projects/">💻 Projects</a>
        <a href="/promentor-ai/" class="active">🤖 PromMentor AI</a>
        <a href="/logout/">🚪 Logout</a>
    </div>

    <!-- MAIN CHAT -->
    <div class="chat-container">
        <div class="chat-overlay"></div>
        <div class="chat-wrapper">
            
            <div class="chat-header">
                <h1>🤖 PromMentor AI</h1>
                <div class="status">
                    <span class="status-dot"></span> Online
                </div>
            </div>

            <div class="chat-messages" id="chatMessages">
                <div class="message ai">
                    Hello! I am PromMentor AI. I can guide you through engineering concepts, suggest projects, or help debug code. What can I help you with today?
                </div>
                
                <!-- Typing Indicator -->
                <div class="typing-indicator" id="typingIndicator">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            </div>

            <div class="chat-input-area">
                <textarea 
                    id="chatInput" 
                    class="chat-input" 
                    placeholder="Message PromMentor..." 
                    rows="1"
                ></textarea>
                <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>

        </div>
    </div>

    <script>
        const inputField = document.getElementById('chatInput');
        const messagesDiv = document.getElementById('chatMessages');
        const typingIndicator = document.getElementById('typingIndicator');

        // Auto-resize textarea
        inputField.addEventListener('input', function() {
            this.style.height = '24px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        // Send on Enter (Shift+Enter for new line)
        inputField.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function formatText(text) {
            let formatted = text.replace(/\n/g, '<br>');
            formatted = formatted.replace(/```([\s\S]*?)```/g, '<pre style="background:#0f1115;padding:10px;border-radius:8px;overflow-x:auto;"><code>$1</code></pre>');
            formatted = formatted.replace(/`([^`]+)`/g, '<code style="background:#0f1115;padding:2px 6px;border-radius:4px;color:#3b82f6;">$1</code>');
            return formatted;
        }

        function getCSRFToken() {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, 10) === ('csrftoken=')) {
                        cookieValue = decodeURIComponent(cookie.substring(10));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if(!text) return;

            addMessage(text, 'user');
            inputField.value = '';
            inputField.style.height = '24px';

            showTyping();

            try {
                const response = await fetch("/api/promentor/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "X-CSRFToken": getCSRFToken()
                    },
                    body: JSON.stringify({ message: text })
                });

                const data = await response.json();
                hideTyping();

                if(data.error) {
                    addMessage("Error: " + data.error, 'ai');
                } else if(data.reply) {
                    addMessage(data.reply, 'ai');
                } else {
                    addMessage("Sorry, I could not process that.", 'ai');
                }

            } catch (error) {
                hideTyping();
                addMessage("Connection failed. Please try again later.", 'ai');
            }
        }

        function addMessage(text, sender) {
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerHTML = formatText(text);
            
            messagesDiv.insertBefore(div, typingIndicator);
            scrollToBottom();
        }

        function showTyping() {
            typingIndicator.classList.add('active');
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.classList.remove('active');
        }

        function scrollToBottom() {
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
    </script>
</body>
</html>
